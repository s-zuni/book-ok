workflows:
  capacitor-ios:
    name: iOS Build & App Store Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "seung jun"
    environment:
      groups:
        - bok                        # ← CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD 불러오기
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bookok.kr"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates              # ← CM_CERTIFICATE로 인증서 먼저 추가
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create                             # ← 프로비저닝 프로파일 가져오기

      - name: Build iOS App
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -n 1)
          if [ -z "$PROFILE" ]; then
            echo "❌ 프로비저닝 프로파일을 찾을 수 없습니다"
            exit 1
          fi
          echo "✅ 프로파일: $PROFILE"
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          echo "✅ UUID: $UUID"
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning \
            | grep "Apple Distribution" \
            | awk -F'"' '{print $2}' \
            | head -n 1)
          echo "✅ 서명 인증서: $SIGNING_IDENTITY"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs \
              "PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID \
               PROVISIONING_PROFILE=$UUID \
               CODE_SIGN_IDENTITY=$SIGNING_IDENTITY \
               CODE_SIGN_STYLE=Manual"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
