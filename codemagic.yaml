workflows:
  capacitor-ios:
    name: iOS Build & App Store Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "seung jun"
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bookok.kr"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web App
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Debug CLI syntax
        script: |
          echo "=== app-store-connect 버전 ==="
          app-store-connect --version 2>&1

          echo "=== certificates 도움말 ==="
          app-store-connect certificates --help 2>&1 || true

          echo "=== certificates create 도움말 ==="
          app-store-connect certificates create --help 2>&1 || true
    artifacts:
      - build/ios/ipa/*.ipa
