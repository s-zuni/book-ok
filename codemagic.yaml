workflows:
  capacitor-ios:
    name: iOS Build & App Store Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bookok.kr"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web App
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Clean Xcode Project Settings
        script: |
          # 1. 번들 ID를 com.bookok.kr로 완벽하게 강제 매핑
          sed -i '' -E "s/PRODUCT_BUNDLE_IDENTIFIER[[:space:]]*=[[:space:]]*[^;]*;/PRODUCT_BUNDLE_IDENTIFIER = \"$BUNDLE_ID\";/g" "$XCODE_PROJECT/project.pbxproj"
          
          # 2. 친구분 맥에서 딸려온 기존 Team ID 및 프로파일 지정 내역 싹 지우기 (충돌의 핵심 원인 제거)
          sed -i '' -E "s/DEVELOPMENT_TEAM[[:space:]]*=[[:space:]]*[^;]*;//g" "$XCODE_PROJECT/project.pbxproj"
          sed -i '' -E "s/PROVISIONING_PROFILE_SPECIFIER[[:space:]]*=[[:space:]]*[^;]*;//g" "$XCODE_PROJECT/project.pbxproj"
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
