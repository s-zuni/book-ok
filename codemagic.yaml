workflows:
  capacitor-ios:
    name: iOS Build & App Store Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "seung jun"
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bookok.kr"
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles   # ← 이 줄 추가! Xcode에 프로파일 자동 적용

      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
          # ↑ use-profiles 사용 후엔 수동 UUID 주입 불필요 → 단순화

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
