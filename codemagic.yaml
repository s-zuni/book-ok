      - name: Set up code signing
        script: |
          keychain initialize

          echo "=== Apple에서 서명 파일 가져오기 시도 ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose 2>&1 || true

          echo "=== 프로비저닝 프로파일 확인 ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null \
            || echo "프로파일 없음"

          echo "=== 인증서 추가 ==="
          keychain add-certificates
